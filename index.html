<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你是西游记里的哪个角色？</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap');

    :root {
      /* 主色调 - 朱砂红与鎏金 */
      --cinnabar: #c45c48;
      --cinnabar-dark: #a04030;
      --cinnabar-light: #e07060;
      --gold: #d4a84b;
      --gold-light: #f0d78c;
      --gold-dark: #b08d3a;
      
      /* 辅助色 */
      --ink: #2c241b;
      --ink-light: #5a4d3d;
      --parchment: #faf6f0;
      --parchment-dark: #f0e8dc;
      --warm-gray: #8b7e6a;
      
      /* 功能色 */
      --jade: #5a8a6e;
      --lapis: #4a6fa5;
      
      /* 阴影 */
      --shadow-sm: 0 2px 8px rgba(44,36,27,0.06);
      --shadow-md: 0 4px 16px rgba(44,36,27,0.08);
      --shadow-lg: 0 8px 32px rgba(44,36,27,0.12);
      --shadow-gold: 0 4px 20px rgba(212,168,75,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
      background: var(--parchment);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      line-height: 1.8;
    }

    /* 宣纸纹理背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        /* 云纹装饰 */
        radial-gradient(ellipse 400px 150px at 5% 10%, rgba(212,168,75,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 300px 120px at 95% 20%, rgba(196,92,72,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 350px 140px at 50% 80%, rgba(212,168,75,0.05) 0%, transparent 70%),
        /* 基础渐变 */
        linear-gradient(180deg, #f8f4ed 0%, var(--parchment) 50%, #f5f0e6 100%);
      z-index: -1;
    }
    
    /* 顶部装饰线 */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cinnabar) 0%, var(--gold) 50%, var(--cinnabar) 100%);
      z-index: 1000;
    }

    /* ===== 顶部 ===== */
    .hero {
      text-align: center;
      padding: 48px 20px 36px;
      position: relative;
    }
    
    /* 印章式标签 */
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cinnabar);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      letter-spacing: 3px;
      box-shadow: 0 2px 8px rgba(196,92,72,0.3);
      position: relative;
    }
    .hero-tag::before {
      content: '◆';
      font-size: 8px;
      opacity: 0.7;
    }
    
    .hero h1 {
      font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
      font-size: clamp(32px, 7vw, 52px);
      color: var(--ink);
      line-height: 1.4;
      font-weight: 400;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    
    .hero h1 span {
      display: block;
      font-size: 0.5em;
      color: var(--warm-gray);
      letter-spacing: 8px;
      margin-top: 8px;
      font-family: 'Noto Serif SC', serif;
    }
    
    .hero p { 
      margin-top: 16px; 
      color: var(--ink-light); 
      font-size: 15px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.9;
    }

    /* 起始页角色图 */
    .hero-illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      display: block;
    }

    /* ===== 进度条 ===== */
    .progress-wrap {
      max-width: 560px;
      margin: 0 auto 16px;
      padding: 0 20px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--warm-gray);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .progress-label span:last-child {
      color: var(--cinnabar);
      font-weight: 600;
    }
    .progress-bar {
      height: 6px;
      background: var(--parchment-dark);
      border-radius: 3px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cinnabar-light), var(--cinnabar));
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    }

    /* ===== 题目卡片 ===== */
    #quiz-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .question-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--parchment-dark);
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold));
      border-radius: 16px 16px 0 0;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .question-num { 
      font-size: 11px; 
      color: var(--warm-gray); 
      letter-spacing: 2px; 
      margin-bottom: 12px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .question-num span {
      color: var(--cinnabar);
      font-weight: 700;
      font-size: 14px;
    }
    
    .question-text { 
      font-size: clamp(18px, 4.5vw, 24px); 
      color: var(--ink); 
      line-height: 1.7; 
      margin-bottom: 28px;
      font-weight: 600;
    }
    
    .question-scene {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #fef9f0, #fdf3e0);
      border: 1px solid var(--gold-light);
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--cinnabar-dark);
      margin-bottom: 24px;
      font-weight: 500;
    }
    .question-scene::before {
      content: '◈';
      color: var(--gold);
    }

    /* ===== 选项 ===== */
    .options { display: flex; flex-direction: column; gap: 14px; }

    .opt-btn {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--parchment);
      border: 1.5px solid var(--parchment-dark);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      font-family: inherit;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.7;
      position: relative;
      overflow: hidden;
    }
    
    .opt-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: linear-gradient(180deg, var(--cinnabar-light), var(--cinnabar));
      transition: width 0.25s ease;
    }
    
    .opt-btn:hover {
      border-color: var(--gold);
      background: #fff;
      transform: translateX(6px);
      box-shadow: var(--shadow-gold);
    }
    
    .opt-btn:hover::before {
      width: 4px;
    }
    
    .opt-btn.selected {
      border-color: var(--cinnabar);
      background: linear-gradient(135deg, #fdf6f4, #faf0ec);
      box-shadow: 0 4px 16px rgba(196,92,72,0.15);
    }
    
    .opt-btn.selected::before {
      width: 4px;
    }
    
    .opt-letter {
      min-width: 28px;
      height: 28px;
      background: #fff;
      border: 2px solid var(--gold);
      color: var(--gold-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s ease;
    }
    
    .opt-btn:hover .opt-letter {
      border-color: var(--cinnabar);
      color: var(--cinnabar);
      transform: scale(1.1);
    }
    
    .opt-btn.selected .opt-letter { 
      background: var(--cinnabar);
      border-color: var(--cinnabar);
      color: #fff;
    }

    /* ===== 确认按钮 ===== */
    .next-wrap { margin-top: 28px; text-align: center; }
    .next-btn {
      background: linear-gradient(135deg, var(--cinnabar), var(--cinnabar-dark));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px 48px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(196,92,72,0.35);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: none;
      position: relative;
      overflow: hidden;
    }
    
    .next-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .next-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 24px rgba(196,92,72,0.45);
    }
    
    .next-btn:hover::before {
      left: 100%;
    }
    
    .next-btn:active {
      transform: translateY(0);
    }
    
    .next-btn.visible { 
      display: inline-flex;
      align-items: center;
      gap: 8px;
      animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .next-btn.visible::after {
      content: '→';
      font-size: 18px;
    }
    
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ===== 结果页 ===== */
    #result-section {
      display: none;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    .result-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--parchment-dark);
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-header {
      padding: 48px 32px 36px;
      text-align: center;
      position: relative;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, transparent 100%);
    }
    
    .result-header::before {
      content: '❝';
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 60px;
      color: rgba(255,255,255,0.15);
      font-family: Georgia, serif;
    }
    
    .result-illus {
      width: 140px;
      height: 140px;
      margin: 0 auto 16px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
    }
    
    .result-subtitle { 
      font-size: 13px; 
      color: rgba(255,255,255,0.85); 
      margin-bottom: 8px; 
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 500;
    }
    
    .result-name { 
      font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
      font-size: clamp(36px, 8vw, 52px); 
      color: #fff; 
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      letter-spacing: 6px;
    }
    
    .result-alias { 
      font-size: 15px; 
      color: rgba(255,255,255,0.9); 
      margin-top: 10px;
      font-weight: 500;
    }

    .result-body { padding: 32px 32px 40px; }
    
    .result-desc { 
      font-size: 16px; 
      color: var(--ink); 
      line-height: 2; 
      margin-bottom: 28px;
      text-align: justify;
    }

    .tag-group { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px dashed var(--parchment-dark);
    }
    
    .tag {
      background: linear-gradient(135deg, #faf6f0, #f5ede0);
      color: var(--cinnabar-dark);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid var(--gold-light);
      font-weight: 500;
    }

    .traits-title { 
      font-size: 14px; 
      color: var(--ink-light); 
      margin-bottom: 16px; 
      padding-bottom: 10px; 
      border-bottom: 1px solid var(--parchment-dark);
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .trait-row { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      margin-bottom: 14px; 
      font-size: 14px; 
      color: var(--ink);
    }
    
    .trait-bar-wrap { 
      flex: 1; 
      height: 10px; 
      background: var(--parchment-dark); 
      border-radius: 5px; 
      overflow: hidden;
    }
    
    .trait-bar { 
      height: 100%; 
      border-radius: 5px; 
      background: linear-gradient(90deg, var(--gold-light), var(--cinnabar));
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .trait-label { min-width: 56px; font-size: 13px; font-weight: 500; }
    .trait-pct { min-width: 36px; text-align: right; font-size: 13px; color: var(--cinnabar); font-weight: 600; }

    .school-tip {
      background: linear-gradient(135deg, #f0f7f3, #e8f0ec);
      border-radius: 12px;
      padding: 20px 22px;
      margin-top: 24px;
      border-left: 3px solid var(--jade);
    }
    
    .school-tip h4 { 
      font-size: 14px; 
      color: var(--jade); 
      margin-bottom: 10px;
      font-weight: 600;
    }
    
    .school-tip p { 
      font-size: 14px; 
      color: var(--ink-light); 
      line-height: 1.9;
    }

    .retry-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      background: linear-gradient(135deg, var(--cinnabar), var(--cinnabar-dark));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(196,92,72,0.35);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .retry-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .retry-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 24px rgba(196,92,72,0.45);
    }
    
    .retry-btn:hover::before {
      left: 100%;
    }

    .share-row { display: flex; gap: 12px; margin-top: 16px; }
    .share-btn {
      flex: 1;
      background: #fff;
      border: 1.5px solid var(--parchment-dark);
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .share-btn:hover { 
      background: var(--parchment); 
      border-color: var(--gold);
      color: var(--cinnabar-dark);
    }

    /* ===== 起始页 ===== */
    #start-section { text-align: center; padding: 0 20px 80px; }
    .start-card {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--parchment-dark);
      position: relative;
    }
    
    .start-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cinnabar), var(--gold));
      border-radius: 16px 16px 0 0;
    }
    .role-preview {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 24px 0 32px;
    }
    
    .role-chip {
      background: linear-gradient(135deg, #faf6f0, #f5ede0);
      border: 1px solid var(--gold-light);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--cinnabar-dark);
      font-weight: 500;
    }


    
    .start-btn {
      background: linear-gradient(135deg, var(--cinnabar), var(--cinnabar-dark));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 18px 56px;
      font-size: 18px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(196,92,72,0.4);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .start-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .start-btn:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 10px 32px rgba(196,92,72,0.5);
    }
    
    .start-btn:hover::before {
      left: 100%;
    }
    
    .start-desc { 
      font-size: 15px; 
      color: var(--ink-light); 
      line-height: 2; 
      margin-bottom: 28px;
    }

    @media (max-width: 480px) {
      .question-card { padding: 22px 16px; }
      .result-body { padding: 18px 18px 26px; }
    }
  </style>
</head>
<body>

<!-- ========== 起始页 ========== -->
<div id="start-section">
  <div class="hero">
    <!-- 起始页SVG：五人取经插画 -->
    <svg class="hero-illustration" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <!-- 太阳 -->
      <circle cx="96" cy="22" r="12" fill="#FFCC00" opacity="0.85"/>
      <line x1="96" y1="6" x2="96" y2="2" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <line x1="96" y1="38" x2="96" y2="42" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <line x1="80" y1="22" x2="76" y2="22" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <line x1="112" y1="22" x2="116" y2="22" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <line x1="84.7" y1="10.7" x2="82" y2="8" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <line x1="107.3" y1="33.3" x2="110" y2="36" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
      <!-- 云 -->
      <ellipse cx="30" cy="28" rx="20" ry="9" fill="white" opacity="0.9"/>
      <ellipse cx="22" cy="32" rx="12" ry="8" fill="white" opacity="0.9"/>
      <ellipse cx="40" cy="32" rx="12" ry="8" fill="white" opacity="0.9"/>
      <!-- 地面 -->
      <rect x="0" y="95" width="120" height="25" fill="#c8a060" rx="4"/>
      <rect x="0" y="90" width="120" height="8" fill="#d4b070" rx="3"/>
      <!-- 白龙马 -->
      <ellipse cx="60" cy="82" rx="18" ry="10" fill="white" stroke="#ddd" stroke-width="1"/>
      <circle cx="74" cy="74" r="7" fill="white" stroke="#ddd" stroke-width="1"/>
      <line x1="44" y1="88" x2="42" y2="96" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="50" y1="90" x2="48" y2="96" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="70" y1="88" x2="68" y2="96" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="76" y1="88" x2="78" y2="96" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- 唐僧（骑马） -->
      <circle cx="60" cy="62" r="8" fill="#f5c8a0"/>
      <ellipse cx="60" cy="74" rx="8" ry="6" fill="#9966cc"/>
      <rect x="53" y="60" width="14" height="16" rx="3" fill="#9966cc" opacity="0.8"/>
      <!-- 金箍棒+悟空 -->
      <circle cx="30" cy="58" r="7" fill="#c8800a"/>
      <ellipse cx="30" cy="68" rx="6" ry="5" fill="#e8a020"/>
      <line x1="38" y1="48" x2="22" y2="78" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
      <circle cx="38" cy="46" r="4" fill="#FFD700"/>
      <circle cx="22" cy="80" r="4" fill="#FFD700"/>
      <!-- 八戒 -->

// ============================================================
// 状态
// ============================================================
let currentQ = 0;
let scores = new Array(12).fill(0);
let answered = false;
let selectedOpt = null;
let currentSelection = null;

// 随机打乱数组（Fisher-Yates算法）
function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 生成随机化的题目（题目顺序随机 + 每道题选项顺序随机）
let randomizedQuestions = [];

function generateRandomizedQuestions() {
  // 1. 先打乱题目顺序
  const shuffledQuestions = shuffleArray(questions);
  
  // 2. 对每道题，打乱选项顺序，并记录原始索引用于计分
  randomizedQuestions = shuffledQuestions.map(q => {
    const originalOpts = q.opts.map((opt, idx) => ({ ...opt, originalIndex: idx }));
    const shuffledOpts = shuffleArray(originalOpts);
    return {
      ...q,
      opts: shuffledOpts
    };
  });
}

function startQuiz() {
  // 每次开始测试都重新随机化题目
  generateRandomizedQuestions();
  currentQ = 0;
  scores = new Array(12).fill(0);
  answered = false;
  selectedOpt = null;
  currentSelection = null;
  
  document.getElementById('start-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = randomizedQuestions[currentQ];
  const total = randomizedQuestions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('prog-text').textContent = `第 ${currentQ + 1} 题，共 ${total} 题`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  answered = false;
  selectedOpt = null;
  currentSelection = null;

  const letters = ['A','B','C','D'];
  let optsHtml = q.opts.map((o, i) => `
    <button class="opt-btn" onclick="selectOpt(${i})" id="opt-${i}">
      <span class="opt-letter">${letters[i]}</span>
      <span>${o.text}</span>
    </button>
  `).join('');

  document.getElementById('question-wrap').innerHTML = `
    <div class="question-card">
      <div class="question-num">第 ${currentQ+1} 题 / ${total}</div>
      <div class="question-scene">${q.scene}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">${optsHtml}</div>
      <div class="next-wrap">
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">
          确认选择 ✓
        </button>
      </div>
    </div>
  `;
}

function selectOpt(idx) {
  // 允许重新选择，不限制answered状态
  selectedOpt = idx;
  currentSelection = idx;

  // 清除所有选中状态
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`opt-${i}`);
    if (btn) btn.classList.remove('selected');
  }
  // 标记当前选中
  const selected = document.getElementById(`opt-${idx}`);
  if (selected) selected.classList.add('selected');

  // 显示确认按钮
  document.getElementById('next-btn').classList.add('visible');
}

function confirmSelection() {
  if (selectedOpt === null || answered) return;
  answered = true;

  // 记录分数（使用 randomizedQuestions 中存储的原始索引对应的分数）
  const selectedOption = randomizedQuestions[currentQ].opts[selectedOpt];
  const s = selectedOption.scores;
  for (let r = 0; r < 8; r++) scores[r] += s[r];

  // 进入下一题或显示结果
  setTimeout(() => {
    currentQ++;
    answered = false;
    selectedOpt = null;
    currentSelection = null;
    if (currentQ >= randomizedQuestions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }, 300);
}

function nextQuestion() {
  // 现在作为确认按钮使用
  confirmSelection();
}

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';

  let maxScore = -1, maxIdx = 0;
  for (let i = 0; i < 8; i++) {
    if (scores[i] > maxScore) { maxScore = scores[i]; maxIdx = i; }
  }
  const winRole = ROLES[maxIdx];
  const rd = roleData[winRole];

  const traitHtml = rd.traits.map(([label, pct]) => `
    <div class="trait-row">
      <span class="trait-label">${label}</span>
      <div class="trait-bar-wrap">
        <div class="trait-bar" style="width:${pct}%"></div>
      </div>
      <span class="trait-pct">${pct}%</span>
    </div>
  `).join('');

  const tagHtml = rd.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const svgIllus = roleIllustrations[winRole] || '';

  document.getElementById('result-wrap').innerHTML = `
    <div class="result-card">
      <div class="result-header" style="background: linear-gradient(135deg, ${rd.color[0]}, ${rd.color[1]})">
        <div class="result-illus">${svgIllus}</div>
        <div class="result-subtitle">你的西游角色是</div>
        <div class="result-name">${rd.name}</div>
        <div class="result-alias">${rd.alias}</div>
      </div>
      <div class="result-body">
        <div class="tag-group">${tagHtml}</div>
        <p class="result-desc">${rd.desc}</p>
        <div class="traits-title">🌟 你的能力图谱</div>
        ${traitHtml}
        <div class="school-tip">
          <h4>📖 西佐老师寄语</h4>
          <p>${rd.tip}</p>
        </div>
        <button class="retry-btn" onclick="retryQuiz()">🔄 再测一次</button>
        <div class="share-row">
          <button class="share-btn" onclick="copyResult('${rd.name}')">📋 复制结果分享给朋友</button>
        </div>
      </div>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryQuiz() {
  // 重新随机化题目，让每次测试都不一样
  generateRandomizedQuestions();
  currentQ = 0;
  scores = new Array(12).fill(0);
  answered = false;
  selectedOpt = null;
  currentSelection = null;
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('start-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult(name) {
  const link = window.location.href;
  const text = `我在「西佐读名著」测出来是【${name}」！快来测测你是西游记里的哪个角色？\n\n${link}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('✅ 已复制，快去分享给朋友吧！'));
  } else {
    alert('你的结果：\n\n' + text);
  }
}
